<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nusha AI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5}
.box{background:white;padding:30px;border-radius:20px;width:400px}
.chat{display:none;width:800px;height:80vh;flex-direction:column}
input,button{width:100%;padding:10px;margin:5px}
.messages{flex:1;overflow:auto;border:1px solid #ddd;padding:10px}
.user{text-align:right;background:#333;color:white;padding:5px;border-radius:10px;margin:5px}
.ai{text-align:left;background:#eee;padding:5px;border-radius:10px;margin:5px}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h2>Login</h2>
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<button onclick="google()">Google</button>
</div>

<div id="chat" class="chat">
<div class="messages" id="messages"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<script>
const supabase = window.supabase.createClient(
"https://yobjqkuxarnvgfbkbdee.supabase.co",
"YOUR_ANON_KEY"
);

let sessionId = null;

// ✅ AUTH FIX (single source of truth)
supabase.auth.onAuthStateChange(async (_, session) => {
    if (session) {
        document.getElementById("loginBox").style.display="none";
        document.getElementById("chat").style.display="flex";
        await initSession();
    } else {
        document.getElementById("loginBox").style.display="block";
        document.getElementById("chat").style.display="none";
    }
});

async function login(){
    const { error } = await supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
    });
    if(error) alert(error.message);
}

async function signup(){
    const { error } = await supabase.auth.signUp({
        email: email.value,
        password: password.value
    });
    if(error) alert(error.message);
    else alert("Check email (if confirmation enabled)");
}

async function google(){
    await supabase.auth.signInWithOAuth({
        provider:"google",
        options:{ redirectTo: window.location.origin }
    });
}

async function initSession(){
    const { data:{ session } } = await supabase.auth.getSession();

    const res = await fetch("/session", {
        method:"POST",
        headers:{
            Authorization:`Bearer ${session.access_token}`
        }
    });

    const data = await res.json();
    sessionId = data.session_id;

    add("AI","Hello 👋 I am Nusha");
}

async function send(){
    const text = msg.value;
    msg.value="";

    add("user", text);

    const { data:{ session } } = await supabase.auth.getSession();

    const res = await fetch("/chat-stream", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${session.access_token}`
        },
        body: JSON.stringify({
            prompt:text,
            session_id: sessionId
        })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let out="";
    const div = add("AI","...");

    while(true){
        const { value, done } = await reader.read();
        if(done) break;
        out += decoder.decode(value);
        div.innerText = out;
    }
}

function add(type,text){
    const d=document.createElement("div");
    d.className=type;
    d.innerText=text;
    messages.appendChild(d);
    return d;
}
</script>

</body>
</html>
