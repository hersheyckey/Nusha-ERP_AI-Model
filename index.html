<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nusha AI — ERP Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f4f6fa;color:#1a1f2e;display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;background:#fff;border-right:1px solid #e9edf2;display:flex;flex-direction:column;padding:24px 16px}
.sidebar h2{font-weight:600;font-size:24px;background:linear-gradient(135deg,#1f2b3c,#2c3e50);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:28px}
.new-chat{background:#1e2a3a;border:none;color:#fff;font-weight:500;padding:12px 16px;border-radius:14px;cursor:pointer;transition:0.2s}
.new-chat:hover{background:#0f1a24;transform:translateY(-1px)}
.sidebar-footer{margin-top:auto;font-size:12px;color:#8b9bb0;text-align:center;padding-top:24px;border-top:1px solid #edf0f5}
.main{flex:1;display:flex;flex-direction:column;background:#f8fafd}
.header{padding:18px 28px;background:#fff;border-bottom:1px solid #e9edf2;font-weight:600;font-size:18px;color:#1a2b3e}
.chat-box{flex:1;padding:28px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
.message{max-width:80%;padding:14px 20px;border-radius:24px;font-size:15px;line-height:1.55;word-wrap:break-word}
.user{background:#1e2a3a;color:#fff;align-self:flex-end;border-bottom-right-radius:6px}
.ai{background:#fff;border:1px solid #e2e8f0;align-self:flex-start;border-bottom-left-radius:6px;color:#1e2f3e}
.ai.markdown-body{padding:14px 20px}
.ai code{background:#f0f3f8;padding:2px 6px;border-radius:8px;font-family:monospace}
.ai pre{background:#f0f3f8;padding:12px;border-radius:16px;overflow-x:auto}
.input-box{display:flex;padding:18px 24px;background:#fff;border-top:1px solid #e9edf2;gap:12px}
.input-box input{flex:1;padding:14px 18px;border:1px solid #dee4ec;border-radius:32px;font-size:15px;outline:none}
.input-box input:focus{border-color:#90a4c3;box-shadow:0 0 0 3px rgba(30,42,58,0.08)}
.input-box button{background:#1e2a3a;border:none;color:#fff;padding:12px 24px;border-radius:40px;font-weight:500;cursor:pointer}
.input-box button:hover{background:#0f1a24}
.chat-box::-webkit-scrollbar{width:6px}
.chat-box::-webkit-scrollbar-track{background:#eef2f7}
.chat-box::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
@media (max-width:640px){.sidebar{width:80px;padding:20px 8px}.sidebar h2{font-size:20px;text-align:center}.message{max-width:90%}}
</style>
</head>
<body>
<div class="sidebar"><h2>✦ Nusha</h2><button class="new-chat" onclick="resetConversation()">+ New Chat</button><div class="sidebar-footer">ERP Intelligence<br>Groq · Structured options</div></div>
<div class="main"><div class="header">📊 ERP AI Assistant</div><div id="chat" class="chat-box"></div><div class="input-box"><input id="input" placeholder="e.g., Compare Odoo vs ERPNext for inventory management" autofocus /><button onclick="sendMessage()">Send</button></div></div>
<script>
// Detect backend URL (relative if served by FastAPI, else localhost)
const API_BASE = (() => {
    if (window.location.protocol === 'file:') return 'http://127.0.0.1:8000';
    return ''; // relative
})();

const chatContainer = document.getElementById("chat");
let currentSessionId = null;

function renderMarkdown(text) { return DOMPurify.sanitize(marked.parse(text || ''), { USE_PROFILES: { html: true } }); }
function addMessage(text, type, isMarkdown = false) {
    const div = document.createElement("div"); div.className = `message ${type}`;
    if (type === "ai" && isMarkdown) { div.classList.add("markdown-body"); div.innerHTML = renderMarkdown(text); }
    else div.innerText = text;
    chatContainer.appendChild(div); chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
}
function updateAIMarkdown(el, raw) { el.classList.add("markdown-body"); el.innerHTML = renderMarkdown(raw); chatContainer.scrollTop = chatContainer.scrollHeight; }

async function initSession() {
    try {
        const res = await fetch(`${API_BASE}/session`, { method: "POST" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        currentSessionId = data.session_id;
        console.log("Session:", currentSessionId);
    } catch(e) { console.warn("Session init failed", e); currentSessionId = null; }
}

async function resetConversation() {
    if (currentSessionId) await fetch(`${API_BASE}/session/${currentSessionId}`, { method: "DELETE" }).catch(e=>console.warn);
    chatContainer.innerHTML = "";
    await initSession();
    addMessage("✨ New session. I'll always give you **multiple options** with trade-offs. Ask me anything about ERP (ERPNext, Odoo), integrations, or business workflows.", "ai", true);
}

async function sendMessage() {
    const inputEl = document.getElementById("input");
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ""; inputEl.disabled = true;
    addMessage(text, "user");
    const aiDiv = addMessage("⏳ thinking...", "ai");
    let accumulated = "", streamCompleted = false;
    try {
        const payload = { prompt: text, session_id: currentSessionId || null };
        const response = await fetch(`${API_BASE}/chat-stream`, {
            method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(`Server ${response.status}: ${await response.text()}`);
        const reader = response.body.getReader(); const decoder = new TextDecoder();
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            accumulated += decoder.decode(value, { stream: true });
            aiDiv.innerText = accumulated;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        streamCompleted = true;
        if (accumulated.trim()) updateAIMarkdown(aiDiv, accumulated);
        else aiDiv.innerText = "⚠️ No response from assistant.";
    } catch (err) {
        console.error("Fetch error:", err);
        aiDiv.innerText = `❌ Connection error: ${err.message}. Make sure backend is running on ${API_BASE || 'same origin'} and GROQ_API_KEY is set.`;
        aiDiv.classList.add("ai");
    } finally {
        inputEl.disabled = false; inputEl.focus();
        if (!streamCompleted && accumulated === "") aiDiv.innerText = "⚠️ Request interrupted. Check console (F12) for details.";
    }
}

document.getElementById("input").addEventListener("keypress", (e) => e.key === "Enter" && sendMessage());
window.addEventListener("DOMContentLoaded", async () => { await initSession(); addMessage("👋 Hi, I'm **Nusha** – your structured ERP advisor. I'll show you options, comparisons, and recommended paths. Try asking: *'How to sync Shopify orders to Odoo?'*", "ai", true); });
</script>
</body>
</html>
