<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>CloudBytesAI · Nusha AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

<style>

:root{
    --bg:#f6f5f2;
    --text:#1d1d1f;
    --muted:#6e6e73;
    --border:rgba(0,0,0,0.08);
    --shadow:0 10px 30px rgba(0,0,0,0.06);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Inter", sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* soft depth */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 10%, rgba(0,0,0,0.03), transparent 40%),
        radial-gradient(circle at 80% 90%, rgba(0,0,0,0.02), transparent 45%);
    pointer-events:none;
}

.app{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:270px;
    background:#fff;
    border-right:1px solid var(--border);
    padding:24px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

.sidebar-top{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* ================= PREMIUM BADGE ================= */

.badge{

    width:68px;
    height:68px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-direction:row;

    gap:2px;

    background:linear-gradient(145deg,#0a0a0a,#1c1c1c);

    border-radius:12px;

    box-shadow:
        0 18px 40px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.08);

    user-select:none;

    color:#fff;
}

/* MAIN LOGO TEXT */
.badge-main{
    font-size:10px;
    font-weight:600;
    letter-spacing:0.8px;
}

/* AI SMALLER (FIXED) */
.badge-ai{
    font-size:7px;
    font-weight:600;
    opacity:0.7;
    transform:translateY(-1px);
}

/* BUTTON */
.btn{
    padding:10px 12px;
    font-size:12px;
    font-weight:500;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fafafa;
    cursor:pointer;
}

.btn:hover{
    background:#f2f2f2;
}

/* ================= BOTTOM BRAND ================= */

.brand-bottom{
    border-top:1px solid rgba(0,0,0,0.06);
    padding-top:16px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.brand{
    font-size:14px;
    font-weight:600;
}

.sub{
    font-size:11px;
    color:var(--muted);
    line-height:1.4;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
}

.header{
    padding:14px 20px;
    font-size:13px;
    color:var(--muted);
    border-bottom:1px solid var(--border);
    background:#fff;
}

/* ================= CHAT ================= */

.chat{
    flex:1;
    overflow-y:auto;
    padding:clamp(18px,4vw,40px) clamp(14px,6vw,120px);
    display:flex;
    flex-direction:column;
    gap:14px;
}

.msg{
    max-width:720px;
    padding:14px 16px;
    border-radius:14px;
    font-size:13px;
    line-height:1.6;
    word-wrap:break-word;
}

.user{
    align-self:flex-end;
    background:#e8f0ff;
    border:1px solid rgba(0,0,0,0.05);
}

.ai{
    align-self:flex-start;
    background:#fff;
    border:1px solid var(--border);
    box-shadow:var(--shadow);
}

/* ================= INPUT ================= */

.input{
    display:flex;
    gap:10px;
    padding:14px;
    background:#fff;
    border-top:1px solid var(--border);
    padding-bottom: calc(14px + env(safe-area-inset-bottom));
}

.input input{
    flex:1;
    padding:12px;
    font-size:14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fafafa;
    outline:none;
}

.input button{
    padding:10px 14px;
    font-size:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#f5f5f5;
    cursor:pointer;
}

.input button:hover{
    background:#ededed;
}

/* MOBILE */
@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .chat{
        padding:18px 14px;
        gap:12px;
    }

    .msg{
        max-width:100%;
        font-size:14px;
    }

    .input{
        padding:10px;
    }
}

</style>
</head>

<body>

<div class="app">

    <div class="sidebar">

        <div class="sidebar-top">

            <!-- FIXED LOGO -->
            <div class="badge">
                <span class="badge-main">NUSHA</span>
                <span class="badge-ai">AI</span>
            </div>

            <button class="btn" onclick="resetChat()">New Chat</button>

        </div>

        <div class="brand-bottom">

            <div class="brand">CloudBytesAI</div>

            <div class="sub">
                Enterprise AI · ERP · Automation · Systems
            </div>

        </div>

    </div>

    <div class="main">

        <div class="header">
            ERP Intelligence Assistant
        </div>

        <div id="chat" class="chat"></div>

        <div class="input">

            <input id="input" placeholder="Ask ERP, architecture, workflows..." />

            <button onclick="send()">Send</button>

        </div>

    </div>

</div>

<script>

let session=null;
const chat=document.getElementById("chat");

function add(text,type){

    const d=document.createElement("div");

    d.className=`msg ${type}`;

    if(type==="ai"){
        d.innerHTML=DOMPurify.sanitize(marked.parse(text));
    }else{
        d.innerText=text;
    }

    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;

    return d;
}

async function init(){
    const r=await fetch("/session",{method:"POST"});
    const d=await r.json();
    session=d.session_id;
}

async function send(){

    const input=document.getElementById("input");

    const text=input.value.trim();

    if(!text) return;

    input.value="";

    add(text,"user");

    const ai=add("Thinking...","ai");

    const res=await fetch("/chat-stream",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            prompt:text,
            session_id:session
        })
    });

    const reader=res.body.getReader();
    const decoder=new TextDecoder();

    let out="";

    while(true){
        const {value,done}=await reader.read();
        if(done) break;
        out+=decoder.decode(value);
        ai.innerHTML=DOMPurify.sanitize(marked.parse(out));
    }
}

async function resetChat(){
    chat.innerHTML="";
    await init();
    add("Apple-style AI ready.","ai");
}

window.onload=async()=>{
    await init();
    add("Welcome to CloudBytesAI — NUSHA AI is ready.","ai");
};

</script>

</body>
</html>
