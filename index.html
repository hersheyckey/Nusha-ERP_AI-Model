<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nusha AI – Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: system-ui; display:flex; align-items:center; justify-content:center; height:100vh; background:#f0f2f5; margin:0; }
.modal, .chat { background:white; border-radius:24px; padding:32px; width:400px; box-shadow:0 20px 40px rgba(0,0,0,0.1); }
.chat { width:800px; max-width:90%; display:flex; flex-direction:column; height:80vh; }
input, button { width:100%; padding:12px; margin:8px 0; border-radius:40px; border:1px solid #ccc; }
button { background:#1e2a3a; color:white; cursor:pointer; font-weight:bold; }
.google-btn { background:#4285F4; }
.hidden { display:none; }
.messages { flex:1; overflow-y:auto; border:1px solid #eee; padding:16px; margin-bottom:16px; }
.user { text-align:right; color:white; background:#1e2a3a; display:inline-block; padding:8px 12px; border-radius:18px; }
.ai { text-align:left; background:#f1f3f4; display:inline-block; padding:8px 12px; border-radius:18px; }
.error { color:red; font-size:12px; text-align:center; }
</style>
</head>

<body>

<div id="modal" class="modal">
<h2>Nusha AI</h2>
<button id="googleBtn" class="google-btn">Sign in with Google</button>
<hr>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="loginBtn">Sign in</button>
<button id="signupBtn">Sign up</button>
<div id="errorMsg" class="error"></div>
</div>

<div id="chatContainer" class="chat hidden">
<div style="font-weight:bold;margin-bottom:16px;">Nusha – ERP Assistant</div>
<div id="messages" class="messages"></div>
<div style="display:flex;gap:8px;">
<input type="text" id="messageInput">
<button id="sendBtn" style="width:auto;">Send</button>
</div>
</div>

<script>
const SUPABASE_URL = 'https://yobjqkuxarnvgfbkbdee.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvYmpxa3V4YXJudmdmYmtiZGVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTg4NDcsImV4cCI6MjA5MzYzNDg0N30.xm3QWnTap_O6Qfo5-Fu3irL-kLXg7YFaXoqeNrvpG5s';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentSessionId = null;

const modal = document.getElementById('modal');
const chat = document.getElementById('chatContainer');
const messages = document.getElementById('messages');
const input = document.getElementById('messageInput');

function showChat(){ modal.classList.add('hidden'); chat.classList.remove('hidden'); }
function showLogin(){ modal.classList.remove('hidden'); chat.classList.add('hidden'); }

// ✅ Session check
async function checkSession(){
    const { data:{ session } } = await supabase.auth.getSession();
    if(session){
        showChat();
        await initSession();
    } else showLogin();
}

// ✅ Auth listener (fixes OAuth)
supabase.auth.onAuthStateChange((event, session)=>{
    if(session){
        showChat();
        initSession();
    } else showLogin();
});

// ✅ Login
async function login(email,password){
    const { error } = await supabase.auth.signInWithPassword({email,password});
    if(error){
        errorMsg.innerText = error.message;
        return;
    }
}

// ✅ Signup
async function signup(email,password){
    const { error } = await supabase.auth.signUp({email,password});
    if(error){
        errorMsg.innerText = error.message;
        return;
    }
    alert("Signup successful");
}

// ✅ Google
async function googleLogin(){
    await supabase.auth.signInWithOAuth({
        provider:'google',
        options:{ redirectTo: window.location.origin }
    });
}

// ✅ Create backend session
async function initSession(){
    const { data:{ session } } = await supabase.auth.getSession();
    const token = session?.access_token;
    if(!token) return;

    const res = await fetch('/session',{
        method:'POST',
        headers:{ Authorization:`Bearer ${token}` }
    });

    const data = await res.json();
    currentSessionId = data.session_id;

    addMessage("👋 Hi, I'm Nusha", "ai");
}

// ✅ Send message
async function sendMessage(){
    const text = input.value.trim();
    if(!text) return;

    input.value='';
    addMessage(text,'user');

    const { data:{ session } } = await supabase.auth.getSession();
    const token = session?.access_token;

    const ai = addMessage("⏳ thinking...","ai");

    const res = await fetch('/chat-stream',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            Authorization:`Bearer ${token}`
        },
        body: JSON.stringify({prompt:text, session_id:currentSessionId})
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full='';

    while(true){
        const {value,done} = await reader.read();
        if(done) break;
        full += decoder.decode(value);
        ai.innerText = full;
    }
}

// UI helper
function addMessage(text,type){
    const div=document.createElement('div');
    const bubble=document.createElement('div');
    bubble.className=type;
    bubble.innerText=text;
    div.appendChild(bubble);
    messages.appendChild(div);
    return bubble;
}

// events
loginBtn.onclick=()=>login(email.value,password.value);
signupBtn.onclick=()=>signup(email.value,password.value);
googleBtn.onclick=googleLogin;
sendBtn.onclick=sendMessage;
input.addEventListener('keypress',e=>{ if(e.key==='Enter') sendMessage(); });

checkSession();
</script>

</body>
</html>
